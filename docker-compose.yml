version: '3'
services:

  ### Services ###
  discovery-server:
    image: 'binhtv/ms-ex/discovery-server-image'
    container_name: discovery-server
    build:
      context: ./discovery-server/
    ports:
      - "8761:8761"

  api-gateway:
    image: 'binhtv/ms-ex/api-gateway-image'
    container_name: api-gateway
    build:
      context: ./api-gateway/
    environment:
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me}
      - JWT_ISSUER=${JWT_ISSUER:-evo-auth-service}
    ports:
      - "4040:8080"
    expose:
      - "4040"
    depends_on:
      - discovery-server

  product-service:
    container_name: product-service
    image: 'binhtv/ms-ex/product-service-image'
    build:
      context: ./product-service/
    ports:
      - "4041:4041"
    environment:
      - server.port=4041
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-productservice:5432/product-service
      - SPRING_DATASOURCE_USERNAME=productservice-user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - spring.kafka.bootstrap-servers=kafka:29092
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-change-me}

    depends_on:
      - postgres-productservice
      - discovery-server
      - kafka


  article-service:
    container_name: article-service
    image: 'binhtv/ms-ex/article-service-image'
    build:
      context: ./article-service/
    ports:
      - "4048:4048"
    expose:
      - "4048"
    environment:
      - server.port=4048
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-articleservice:5432/article-service
      - SPRING_DATASOURCE_USERNAME=articleservice-user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
    depends_on:
      - postgres-articleservice
      - discovery-server
  order-service:
    image: 'binhtv/ms-ex/order-service-image'
    container_name: order-service
    build:
      context: ./order-service/
    environment:
      - server.port=4042
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - spring.datasource.url=jdbc:mysql://mysql-orderservice:3306/order-service?createDatabaseIfNotExist=true
      - spring.datasource.username=root
      - spring.datasource.password=123456
      - spring.jpa.hibernate.ddl-auto=update
      - spring.kafka.bootstrap-servers=kafka:29092
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-change-me}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE:-replace-me}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET:-replace-me}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:-http://localhost:5173/thanh-toan/ket-qua}
    ports:
      - "4042:4042"
    expose:
      - "4042"
    depends_on:
      - discovery-server
      - mysql-orderservice
      - kafka

  notification-service:
    image: 'binhtv/ms-ex/notification-service'
    container_name: notification-service
    build:
      context: ./notification-service/
    environment:
      - server.port=4044
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notificationservice:5432/notification-service
      - SPRING_DATASOURCE_USERNAME=notificationservice-user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SMTP_HOST=${SMTP_HOST:-host.docker.internal}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-no-reply@evo.local}
      - MAIL_SUPPORT_TO=${MAIL_SUPPORT_TO:-support@evo.local}
    ports:
      - "4044:4044"
    expose:
      - "4044"
    depends_on:
      - discovery-server
      - kafka
      - postgres-notificationservice

  auth-service:
    image: 'binhtv/ms-ex/auth-service-image'
    container_name: auth-service
    build:
      context: ./auth-service/
    environment:
      - server.port=4045
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-authservice:5432/auth-service
      - SPRING_DATASOURCE_USERNAME=authservice-user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - spring.kafka.bootstrap-servers=kafka:29092
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me}
      - JWT_ISSUER=${JWT_ISSUER:-evo-auth-service}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-replace-me}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-replace-me}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-replace-me}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-replace-me}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "4045:4045"
    expose:
      - "4045"
    depends_on:
      - postgres-authservice
      - discovery-server
      - kafka

  user-service:
    image: 'binhtv/ms-ex/user-service-image'
    container_name: user-service
    build:
      context: ./user-service/
    environment:
      - server.port=4046
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-userservice:5432/user-service
      - SPRING_DATASOURCE_USERNAME=userservice-user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka
      - spring.kafka.bootstrap-servers=kafka:29092
      - spring.kafka.consumer.group-id=user-service-id
    ports:
      - "4046:4046"
    expose:
      - "4046"
    depends_on:
      - postgres-userservice
      - discovery-server
      - kafka

  ### Dependencies ###
  postgres-authservice:
    container_name: postgres-authservice
    image: postgres
    environment:
      POSTGRES_DB: auth-service
      POSTGRES_USER: authservice-user
      POSTGRES_PASSWORD: 123456
      PGDATA: /data/postgres
    volumes:
      - ./postgres-authservice:/data/postgres
    expose:
      - "5433"
    ports:
      - "5433:5433"
    command: -p 5433
    restart: unless-stopped

  postgres-userservice:
    container_name: postgres-userservice
    image: postgres
    environment:
      POSTGRES_DB: user-service
      POSTGRES_USER: userservice-user
      POSTGRES_PASSWORD: 123456
      PGDATA: /data/postgres
    volumes:
      - ./postgres-userservice:/data/postgres
    expose:
      - "5434"
    ports:
      - "5434:5434"
    command: -p 5434
    restart: unless-stopped

  postgres-productservice:
    container_name: postgres-productservice
    image: postgres
    environment:
      POSTGRES_DB: product-service
      POSTGRES_USER: productservice-user
      POSTGRES_PASSWORD: 123456
      PGDATA: /data/postgres
    volumes:
      - ./postgres-productservice:/data/postgres
    expose:
      - "5431"
    ports:
      - "5431:5431"
    command: -p 5431
    restart: unless-stopped


  postgres-articleservice:
    container_name: postgres-articleservice
    image: postgres
    environment:
      POSTGRES_DB: article-service
      POSTGRES_USER: articleservice-user
      POSTGRES_PASSWORD: 123456
      PGDATA: /data/postgres
    volumes:
      - ./postgres-articleservice:/data/postgres
    expose:
      - "5438"
    ports:
      - "5438:5438"
    command: -p 5438
    restart: unless-stopped

  postgres-notificationservice:
    container_name: postgres-notificationservice
    image: postgres
    environment:
      POSTGRES_DB: notification-service
      POSTGRES_USER: notificationservice-user
      POSTGRES_PASSWORD: 123456
      PGDATA: /data/postgres
    volumes:
      - ./postgres-notificationservice:/data/postgres
    expose:
      - "5439"
    ports:
      - "5439:5439"
    command: -p 5439
    restart: unless-stopped
  mysql-orderservice:
    container_name: mysql-orderservice
    image: mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=order-service
      - MYSQL_TCP_PORT=3307
    expose:
      - "3307"
    ports:
      - "3307:3307"
    volumes:
      - ./mysql-orderservice:/data/mysql


  zookeeper:
    image: zookeeper:3.7.0
    container_name: zookeeper
    restart: "no"
    ports:
      - "2181:2181"

  kafka:
    image: obsidiandynamics/kafka
    container_name: kafka
    restart: "no"
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER_INTERNAL:PLAINTEXT,DOCKER_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: DOCKER_INTERNAL://:29092,DOCKER_EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER_INTERNAL://kafka:29092,DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER_INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    restart: "no"
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - "kafka"

