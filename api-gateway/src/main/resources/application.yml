
logging:
  level:
    org:
      springframework:
        cloud:
          gateway: DEBUG
    reactor:
      netty:
        http:
          client: DEBUG

spring:
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: 'true'
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:5173
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - '*'
                exposedHeaders:
                  - Authorization
                allowCredentials: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          routes:
          - id: order-service
            uri: lb://order-service
            predicates:
              - Path=/api/orders/**,/api/payments/**
            filters:
              - name: CircuitBreaker
                args:
                  name: order
                  fallbackUri: forward:/fallbacks/order

          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/api/products,/api/products/**,/api/categories,/api/categories/**,/api/brands,/api/brands/**
            filters:
              - name: CircuitBreaker
                args:
                  name: product
                  fallbackUri: forward:/fallbacks/product



          - id: article-service
            uri: lb://article-service
            predicates:
              - Path=/api/articles,/api/articles/**
            filters:
              - name: CircuitBreaker
                args:
                  name: article
                  fallbackUri: forward:/fallbacks/article
          - id: upload-service
            uri: lb://upload-service
            predicates:
              - Path=/api/uploads,/api/uploads/**
            filters:
              - name: CircuitBreaker
                args:
                  name: upload
                  fallbackUri: forward:/fallbacks/upload
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**
            filters:
              - name: CircuitBreaker
                args:
                  name: auth
                  fallbackUri: forward:/fallbacks/auth

          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/api/users/**
            filters:
              - name: CircuitBreaker
                args:
                  name: user
                  fallbackUri: forward:/fallbacks/user

          - id: notification-service
            uri: lb://notification-service
            predicates:
              - Path=/api/contact,/api/newsletter/**
            filters:
              - name: CircuitBreaker
                args:
                  name: notification
                  fallbackUri: forward:/fallbacks/notification

gateway:
  jwt:
    secretKey: ${JWT_SECRET_KEY:change-me}
    issuer: ${JWT_ISSUER:evo-auth-service}
    publicPaths:
      - /api/auth/login
      - /api/auth/register
      - /api/products
      - /api/products/**
      - /api/categories
      - /api/categories/**
      - /api/brands
      - /api/brands/**
      - /api/articles
      - /api/articles/**
      - /api/auth/oauth2/**
      - /api/payments/vnpay/ipn
      - /fallbacks/**
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
eureka:
  client:
    registry-fetch-interval-seconds: 5
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    circuitbreakers:
      enabled: 'true'
  endpoint:
    health:
      show-details: always

resilience4j.circuitbreaker:
    instances:
      product:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

      article:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      upload:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

      order:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      auth:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      user:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      notification:
        registerHealthIndicator: true
        event-consumer-buffer-size: 10
        slidingWindowSize: 5
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

resilience4j.timelimiter:
    instances:
      upload:
        timeoutDuration: 30s
        cancelRunningFuture: false
      user:
        timeoutDuration: 5s
        cancelRunningFuture: false
