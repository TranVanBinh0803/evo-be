server:
  port: 4045
  http2:
    enabled: true

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:sapassword}
    hikari:
      pool-name: AuthServiceHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  jta:
    enabled: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:replace-me}
            client-secret: ${FACEBOOK_CLIENT_SECRET:replace-me}
            scope: email,public_profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

springdoc:
  show-actuator: true
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

info:
  app:
    name: authService
    description: Auth Service
    version: 1.0

management:
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    process:
      enabled: true
    os:
      enabled: true
  endpoint:
    health:
      show-details: ALWAYS
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework: INFO
    com.binhtv.authservice: INFO

jwt:
  secretKey: ${JWT_SECRET_KEY:change-me}
  issuer: ${JWT_ISSUER:evo-auth-service}
  expirationMinute: ${JWT_EXPIRATION_MINUTES:10}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

swagger:
  app-name: Auth Service
  app-description: "Spring Boot authentication and user management service with Spring Security, JWT, PostgreSQL, MapStruct, Lombok, and Swagger."
  app-version: 4.0.0
