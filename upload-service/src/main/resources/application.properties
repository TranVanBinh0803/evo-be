spring.config.import=optional:file:.env[.properties],optional:file:upload-service/.env[.properties]
spring.application.name=upload-service
server.port=4047
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

aws.s3.region=${AWS_S3_REGION:ap-southeast-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}
aws.s3.product-image-prefix=${AWS_S3_PRODUCT_IMAGE_PREFIX:products}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
